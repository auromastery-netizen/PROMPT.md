<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auro AI — Business Mastery Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f;--bg2:#0d0d1c;--bg3:#111124;
  --gold:#F7C63A;--orange:#FF6B35;
  --text:#e8e8f0;--muted:#6e6e8e;
  --border:rgba(247,198,58,0.1);--border2:rgba(255,255,255,0.06);
  --teal:#3ecfb2;--red:#ff6b6b;--purple:#a97cf8;--green:#4ade80;
  --sidebar-w:310px;--header-h:62px;
}

html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;
  overflow-x:hidden;
}

.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(247,198,58,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(247,198,58,.03) 1px,transparent 1px);
  background-size:56px 56px;
}
.bg-glow{
  position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:860px;height:500px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse,rgba(247,198,58,.08) 0%,rgba(255,107,53,.04) 45%,transparent 70%);
}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:200;
  display:flex;align-items:center;gap:0;padding:0 24px 0 20px;
  background:rgba(7,7,15,.9);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
#hamburger{
  display:none;width:40px;height:40px;margin-right:8px;flex-shrink:0;
  background:none;border:none;cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
#hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .2s ease}
.header-logo{
  font-family:'Bebas Neue',cursive;font-size:1.7rem;letter-spacing:.06em;
  color:var(--gold);text-shadow:0 0 18px rgba(247,198,58,.4);text-decoration:none;
  flex-shrink:0;
}
.header-logo span{color:var(--text)}
.header-divider{width:1px;height:24px;background:var(--border2);margin:0 16px;flex-shrink:0}
.header-course{font-size:.78rem;font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-spacer{flex:1}
.progress-pill{
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:20px;padding:6px 14px;
}
.progress-bar-wrap{width:80px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:3px;transition:width .4s ease}
.progress-pct{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);z-index:100;
  background:var(--bg2);border-right:1px solid var(--border2);
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sidebar-top{padding:20px 20px 16px}
.sidebar-progress-label{
  font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:10px;
}
.sidebar-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:8px}
.sidebar-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:3px;transition:width .4s ease}
.sidebar-progress-text{font-size:.78rem;color:var(--muted)}
.sidebar-progress-text strong{color:var(--text)}

/* Module group */
.mod-group{border-bottom:1px solid var(--border2)}
.mod-toggle{
  width:100%;display:flex;align-items:center;gap:12px;padding:14px 20px;
  background:none;border:none;cursor:pointer;text-align:left;
  transition:background .15s ease;
}
.mod-toggle:hover{background:rgba(255,255,255,.02)}
.mod-icon{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.mod-info{flex:1;min-width:0}
.mod-title{
  font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:.04em;
  color:var(--text);display:block;line-height:1.1;
}
.mod-progress-text{font-size:.72rem;color:var(--muted);display:block;margin-top:2px}
.mod-chevron{
  flex-shrink:0;font-size:.7rem;color:var(--muted);
  transition:transform .25s ease;display:block;
}
.mod-toggle[aria-expanded="true"] .mod-chevron{transform:rotate(180deg)}

/* Lesson list */
.lesson-list{display:none;padding:0 0 8px}
.mod-toggle[aria-expanded="true"] + .lesson-list{display:block}
.lesson-item{
  display:flex;align-items:center;gap:10px;padding:9px 20px 9px 16px;
  cursor:pointer;transition:background .15s ease;border-left:3px solid transparent;
}
.lesson-item:hover{background:rgba(255,255,255,.03)}
.lesson-item.active{background:rgba(255,255,255,.04)}
.lesson-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.65rem;transition:all .2s ease;
}
.lesson-check.done{background:#4ade80;border-color:#4ade80;color:#07070f;font-weight:700}
.lesson-title{font-size:.82rem;color:var(--muted);flex:1;line-height:1.3;transition:color .15s ease}
.lesson-item.active .lesson-title,.lesson-item:hover .lesson-title{color:var(--text)}
.lesson-dur{font-size:.72rem;color:rgba(110,110,142,.6);flex-shrink:0;white-space:nowrap}

/* ── OVERLAY (mobile) ── */
#overlay{
  display:none;position:fixed;inset:0;z-index:90;
  background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
}

/* ── MAIN ── */
#main{
  margin-left:var(--sidebar-w);margin-top:var(--header-h);
  min-height:calc(100vh - var(--header-h));position:relative;z-index:1;
}

/* ── WELCOME SCREEN ── */
.welcome{
  min-height:calc(100vh - var(--header-h));
  display:flex;align-items:center;justify-content:center;
  padding:60px 40px;text-align:center;position:relative;
}
.welcome-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:400px;pointer-events:none;
  background:radial-gradient(ellipse,rgba(247,198,58,.1) 0%,transparent 65%);
}
.welcome-inner{position:relative;z-index:1;max-width:560px}
.w-eyebrow{
  font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--orange);display:block;margin-bottom:20px;
}
.w-h1{
  font-family:'Bebas Neue',cursive;font-size:4rem;letter-spacing:.04em;
  line-height:1;margin-bottom:20px;
}
.w-h1 .gold{color:var(--gold)}
.w-sub{color:var(--muted);font-size:.97rem;max-width:440px;margin:0 auto 36px;line-height:1.7}
.welcome-modules{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:40px;
}
.welcome-mod-pill{
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:8px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;text-align:left;
}
.w-mod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.w-mod-name{font-size:.82rem;font-weight:500;color:var(--text)}
.btn-begin{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  color:#07070f;font-family:'DM Sans',sans-serif;font-weight:800;font-size:1.05rem;
  padding:18px 40px;border-radius:7px;border:none;cursor:pointer;
  box-shadow:0 4px 28px rgba(247,198,58,.3);transition:transform .2s ease,box-shadow .2s ease;
}
.btn-begin:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(247,198,58,.45)}

/* ── LESSON VIEW ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .4s ease both}

.lesson-view{padding:40px 48px 80px;max-width:860px}
.breadcrumb{font-size:.78rem;color:var(--muted);margin-bottom:24px}
.breadcrumb span{color:var(--text)}

/* Video block */
.lesson-video-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;margin-bottom:32px;
  box-shadow:0 0 40px rgba(0,0,0,.4);
}
.lesson-video-embed{
  position:relative;aspect-ratio:16/9;background:#08081a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.lesson-play-btn{
  width:56px;height:56px;border-radius:50%;border:2px solid var(--mc,var(--gold));
  display:flex;align-items:center;justify-content:center;
}
.lesson-play-btn::after{
  content:'';width:0;height:0;margin-left:4px;
  border-top:10px solid transparent;border-bottom:10px solid transparent;
  border-left:18px solid var(--mc,var(--gold));
}
.lesson-video-caption{font-size:.8rem;color:var(--muted);text-align:center;padding:0 20px}
.lesson-video-caption strong{color:var(--text);display:block;margin-bottom:4px}
.lesson-duration-badge{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.7);border:1px solid var(--border2);
  border-radius:20px;padding:4px 10px;font-size:.72rem;color:var(--muted);
}

/* Lesson header */
.lesson-tag-line{
  font-size:.72rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  margin-bottom:12px;color:var(--mc,var(--gold));
}
.lesson-h1{
  font-family:'Bebas Neue',cursive;font-size:2.5rem;letter-spacing:.03em;
  line-height:1;margin-bottom:16px;
}
.lesson-meta{
  display:flex;align-items:center;gap:16px;margin-bottom:36px;flex-wrap:wrap;
}
.lesson-meta-item{
  display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);
}
.lesson-meta-item svg{width:14px;height:14px;opacity:.6}
.badge-done{
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
  border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:600;
  color:#4ade80;letter-spacing:.08em;
}

/* Lesson body */
.lesson-body{line-height:1.8;color:#c8c8d8}
.lesson-body h3{
  font-family:'Bebas Neue',cursive;font-size:1.35rem;letter-spacing:.04em;
  color:var(--text);margin:32px 0 12px;
}
.lesson-body p{margin-bottom:16px}
.lesson-body strong{color:var(--text);font-weight:600}
.lesson-body ul{list-style:none;margin:16px 0 20px}
.lesson-body ul li{
  display:flex;align-items:flex-start;gap:12px;
  margin-bottom:10px;font-size:.93rem;
}
.lesson-body ul li::before{content:'✦';color:var(--gold);font-size:.72rem;margin-top:5px;flex-shrink:0}
.callout{
  border-left:3px solid var(--mc,var(--gold));
  background:var(--mc-bg,rgba(247,198,58,.06));
  border-radius:0 8px 8px 0;padding:18px 22px;margin:24px 0;
}
.callout-label{
  font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--mc,var(--gold));display:block;margin-bottom:8px;
}
.takeaway{
  border:1px solid rgba(247,198,58,.25);
  background:rgba(247,198,58,.05);
  border-radius:8px;padding:18px 22px;margin:24px 0;
}
.takeaway-label{
  font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold);display:block;margin-bottom:8px;
}

/* Bottom nav */
.lesson-nav{
  display:flex;align-items:stretch;gap:16px;margin-top:48px;flex-wrap:wrap;
}
.nav-btn{
  flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:10px;padding:16px 20px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--muted);
  text-align:left;transition:border-color .2s ease,color .2s ease;
  display:flex;flex-direction:column;gap:4px;
}
.nav-btn:hover:not(:disabled){border-color:var(--border);color:var(--text)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}
.nav-btn-label{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.nav-btn-title{font-size:.85rem;color:var(--text);line-height:1.3;font-weight:500}
.nav-btn.right{text-align:right}
.btn-complete{
  flex:1.5;background:linear-gradient(135deg,var(--gold),var(--orange));color:#07070f;
  font-family:'DM Sans',sans-serif;font-weight:800;font-size:.95rem;
  border:none;border-radius:10px;padding:16px 24px;cursor:pointer;
  box-shadow:0 4px 20px rgba(247,198,58,.25);transition:transform .2s ease,box-shadow .2s ease;
  white-space:nowrap;
}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(247,198,58,.4)}
.btn-already-done{
  flex:1.5;background:transparent;color:#4ade80;font-weight:600;
  border:1.5px solid rgba(74,222,128,.4);border-radius:10px;padding:16px 24px;
  font-family:'DM Sans',sans-serif;font-size:.95rem;cursor:default;
}

/* ── MODULE COMPLETE ── */
.celebrate{
  min-height:calc(100vh - var(--header-h));
  display:flex;align-items:center;justify-content:center;
  padding:60px 40px;text-align:center;
}
.celebrate-inner{max-width:480px}
.celebrate-icon{
  width:80px;height:80px;border-radius:50%;margin:0 auto 28px;
  display:flex;align-items:center;justify-content:center;font-size:2rem;
}
.celebrate-h{
  font-family:'Bebas Neue',cursive;font-size:2.8rem;letter-spacing:.04em;
  line-height:1;margin-bottom:16px;
}
.celebrate-sub{color:var(--muted);font-size:.97rem;margin-bottom:36px;line-height:1.65}
.celebrate-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--orange));color:#07070f;
  font-family:'DM Sans',sans-serif;font-weight:800;font-size:.95rem;
  padding:15px 28px;border-radius:7px;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(247,198,58,.25);transition:transform .2s ease,box-shadow .2s ease;
  text-decoration:none;display:inline-block;
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(247,198,58,.4)}
.btn-outline{
  background:transparent;color:var(--text);border:1.5px solid var(--border2);
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;
  padding:14px 26px;border-radius:7px;cursor:pointer;
  transition:border-color .2s ease,color .2s ease;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}

/* ── COURSE COMPLETE ── */
.course-complete-mods{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:28px auto;max-width:400px;
}
.cc-mod{
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:8px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
}
.cc-mod-icon{font-size:1.2rem}
.cc-mod-name{font-size:.82rem;font-weight:500;color:var(--text)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #hamburger{display:flex}
  #header .header-divider,#header .header-course{display:none}
  #sidebar{transform:translateX(-100%);transition:transform .25s ease}
  #sidebar.open{transform:translateX(0)}
  #overlay{display:none}
  #overlay.visible{display:block}
  #main{margin-left:0}
  .lesson-view{padding:28px 20px 60px}
  .lesson-h1{font-size:2rem}
}
@media(max-width:600px){
  .welcome{padding:40px 20px}
  .welcome-modules{grid-template-columns:1fr}
  .w-h1{font-size:3rem}
  .lesson-nav{flex-direction:column}
  .nav-btn,.btn-complete,.btn-already-done{flex:none;width:100%}
  .nav-btn.right{text-align:left}
  .course-complete-mods{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- HEADER -->
<header id="header">
  <button id="hamburger" aria-label="Toggle menu" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <a href="index.html" class="header-logo">Auro <span>AI</span></a>
  <div class="header-divider"></div>
  <span class="header-course">Business Mastery Program</span>
  <div class="header-spacer"></div>
  <div class="progress-pill">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="header-bar" style="width:0%"></div></div>
    <span class="progress-pct" id="header-pct">0% complete</span>
  </div>
</header>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-top">
    <span class="sidebar-progress-label">Your Progress</span>
    <div class="sidebar-bar-wrap"><div class="sidebar-bar-fill" id="sidebar-bar" style="width:0%"></div></div>
    <p class="sidebar-progress-text"><strong id="sidebar-done">0</strong> of <strong>20</strong> lessons complete</p>
  </div>
  <div id="sidebar-modules"></div>
</aside>

<!-- MOBILE OVERLAY -->
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- MAIN CONTENT -->
<main id="main"></main>

<script>
// ════════════════════════════════════════════════════════
//  COURSE DATA
// ════════════════════════════════════════════════════════
const MODULES = [
  {
    id: 0,
    title: 'Finance & Bookkeeping',
    icon: '📊',
    color: '#3ecfb2',
    tagline: 'Automate your numbers — in 90 minutes a month.',
    lessons: [
      {
        title: 'Why AI Is Changing Small Business Finance Forever',
        duration: '8 min',
        tag: 'Introduction',
        body: `<h3>The Hidden Cost of Manual Finance</h3>
<p>The average small business owner spends over 10 hours every month on financial admin — invoicing, reconciling accounts, categorising expenses, chasing payments. That's 120+ hours a year on work that generates zero revenue.</p>
<p>AI changes this entirely. In this module you'll learn to automate the repetitive financial tasks that are draining your time and energy, and build a system that gives you clearer financial insight than most businesses ten times your size.</p>
<div class="callout"><span class="callout-label">Student Result</span><p>"Before this course I was spending 10 hours a month on bookkeeping. After implementing the AI system it now takes me 90 minutes — and it's more accurate than anything I did manually." — Sarah R., Retail Shop Owner</p></div>
<h3>What This Module Builds</h3>
<ul>
<li>An automated bookkeeping system connected to your bank data</li>
<li>AI-generated monthly P&amp;L reports produced in minutes</li>
<li>A 3-month cash flow forecast that updates automatically</li>
<li>A tax prep system that flags deductions year-round</li>
<li>A custom Finance AI assistant trained on your specific business</li>
</ul>
<div class="takeaway"><span class="takeaway-label">Key Takeaway</span><p>You don't need an accounting degree or expensive software. With free and low-cost AI tools, any small business owner can have a professional-grade financial system running in under a week.</p></div>`
      },
      {
        title: 'Setting Up AI Bookkeeping from Scratch',
        duration: '14 min',
        tag: 'Practical Setup',
        body: `<h3>The AI Bookkeeping Stack</h3>
<p>You only need three tools to build a powerful AI bookkeeping system — and two of them are completely free:</p>
<ul>
<li><strong>Claude or ChatGPT</strong> — Your AI accountant. Categorises, analyses, and explains your finances in plain English.</li>
<li><strong>Google Sheets</strong> — Free, cloud-based spreadsheet that acts as your financial database.</li>
<li><strong>Zapier (free tier)</strong> — Connects your bank or accounting app to Google Sheets automatically.</li>
</ul>
<h3>Step-by-Step Setup</h3>
<p>Start by exporting 3 months of transactions from your bank as a CSV file. Most banks offer this under "Download Statements" or "Export Transactions." Upload the CSV to Google Sheets, then run this prompt with Claude or ChatGPT:</p>
<div class="callout"><span class="callout-label">Bookkeeping Prompt Template</span><p>"Here is a CSV of my business transactions for [month]. Please categorise each transaction into: Revenue, Rent, Payroll, Marketing, Software, Travel, Office Supplies, Other. Then summarise total spend per category and flag any unusual or duplicate transactions."</p></div>
<p>Run this every month and you have instant categorised accounts — without paying a bookkeeper.</p>
<h3>Connecting Zapier</h3>
<p>Once the manual process is running, set up a Zapier automation: when a new row appears in your bank export, automatically append it to your Google Sheet. This eliminates even the CSV download step.</p>
<div class="takeaway"><span class="takeaway-label">Key Takeaway</span><p>The setup takes about 45 minutes the first time. After that it's a 15-minute monthly task. Your AI does the heavy lifting — you just review and approve.</p></div>`
      },
      {
        title: 'Cash Flow Forecasting with AI',
        duration: '12 min',
        tag: 'Advanced Skill',
        body: `<h3>Why Cash Flow Kills Businesses</h3>
<p>More businesses fail from cash flow problems than from lack of profitability. You can be technically profitable and still run out of money. AI cash flow forecasting solves this — giving you a clear view of what's coming 30, 60, and 90 days ahead.</p>
<h3>The 3-Month Forecast Framework</h3>

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const STORAGE_KEY = 'auro_ai_state';

let state = {
  started: false,
  currentModule: 0,
  currentLesson: 0,
  completed: {}
};

// Track which sidebar module groups are open
let openMods = new Set([0]);

function saveState() {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const raw = sessionStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    }
  } catch(e) {}
}

// ════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
}

function overallPct() {
  return Math.round(Object.keys(state.completed).length / 20 * 100);
}

function flatLessons() {
  const arr = [];
  MODULES.forEach((mod, mi) => {
    mod.lessons.forEach((lesson, li) => {
      arr.push({ mi, li, lesson });
    });
  });
  return arr;
}

function lessonKey(mi, li) { return `${mi}-${li}`; }

function isDone(mi, li) { return !!state.completed[lessonKey(mi, li)]; }

function modProgress(mi) {
  return MODULES[mi].lessons.filter((_, li) => isDone(mi, li)).length;
}

// ════════════════════════════════════════════════════════
//  HEADER + SIDEBAR PROGRESS
// ════════════════════════════════════════════════════════
function updateProgress() {
  const pct = overallPct();
  const done = Object.keys(state.completed).length;
  document.getElementById('header-bar').style.width = pct + '%';
  document.getElementById('header-pct').textContent = pct + '% complete';
  document.getElementById('sidebar-bar').style.width = pct + '%';
  document.getElementById('sidebar-done').textContent = done;
}

// ════════════════════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════════════════════
function buildSidebar() {
  updateProgress();
  const container = document.getElementById('sidebar-modules');
  container.innerHTML = MODULES.map((mod, mi) => {
    const mp = modProgress(mi);
    const isOpen = openMods.has(mi);
    const isCurrent = state.started && state.currentModule === mi;
    const accentBg = `rgba(${hexToRgb(mod.color)},0.15)`;

    const lessons = mod.lessons.map((lesson, li) => {
      const done = isDone(mi, li);
      const active = state.started && state.currentModule === mi && state.currentLesson === li;
      const borderColor = active ? mod.color : 'transparent';
      return `
        <div class="lesson-item${active ? ' active' : ''}"
          style="border-left-color:${borderColor}"
          onclick="goToLesson(${mi},${li})">
          <div class="lesson-check${done ? ' done' : ''}">${done ? '✓' : ''}</div>
          <span class="lesson-title">${lesson.title}</span>
          <span class="lesson-dur">${lesson.duration}</span>
        </div>`;
    }).join('');

    return `
      <div class="mod-group">
        <button class="mod-toggle" aria-expanded="${isOpen}"
          onclick="toggleModule(${mi})">
          <div class="mod-icon" style="background:${accentBg}">${mod.icon}</div>
          <div class="mod-info">
            <span class="mod-title">${mod.title}</span>
            <span class="mod-progress-text">${mp}/5 lessons</span>
          </div>
          <span class="mod-chevron">▼</span>
        </button>
        <div class="lesson-list"${isOpen ? ' style="display:block"' : ''}>${lessons}</div>
      </div>`;
  }).join('');
}

function toggleModule(mi) {
  if (openMods.has(mi)) { openMods.delete(mi); } else { openMods.add(mi); }
  buildSidebar();
}

// ════════════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ════════════════════════════════════════════════════════
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('visible', !isOpen);
}

function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('visible');
  }
}

// ════════════════════════════════════════════════════════
//  WELCOME SCREEN
// ════════════════════════════════════════════════════════
function showWelcome() {
  const pills = MODULES.map(m =>
    `<div class="welcome-mod-pill">
      <div class="w-mod-dot" style="background:${m.color}"></div>
      <span class="w-mod-name">${m.icon} ${m.title}</span>
    </div>`
  ).join('');

  document.getElementById('main').innerHTML = `
    <div class="welcome">
      <div class="welcome-glow"></div>
      <div class="welcome-inner">
        <span class="w-eyebrow">Welcome to Your Course</span>
        <h1 class="w-h1">Auro AI <span class="gold">Business Mastery</span></h1>
        <p class="w-sub">You have access to 4 complete modules and 20 lessons covering AI for Finance, Marketing, Customer Service, and Sales. Each lesson ends with a working AI system you can use in your business immediately.</p>
        <div class="welcome-modules">${pills}</div>
        <button class="btn-begin" onclick="beginCourse()">Begin Module 1 &rarr;</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  LESSON VIEW
// ════════════════════════════════════════════════════════
function renderLesson() {
  const mi = state.currentModule;
  const li = state.currentLesson;
  const mod = MODULES[mi];
  const lesson = mod.lessons[li];
  const done = isDone(mi, li);
  const rgb = hexToRgb(mod.color);
  const mcBg = `rgba(${rgb},0.08)`;

  const flat = flatLessons();
  const idx = flat.findIndex(x => x.mi === mi && x.li === li);
  const prev = idx > 0 ? flat[idx - 1] : null;
  const next = idx < flat.length - 1 ? flat[idx + 1] : null;

  const prevBtn = prev
    ? `<button class="nav-btn" onclick="goToLesson(${prev.mi},${prev.li})">
        <span class="nav-btn-label">← Previous</span>
        <span class="nav-btn-title">${prev.lesson.title}</span>
       </button>`
    : `<button class="nav-btn" disabled>
        <span class="nav-btn-label">← Previous</span>
        <span class="nav-btn-title">Start of course</span>
       </button>`;

  const nextBtn = next
    ? `<button class="nav-btn right" onclick="goToLesson(${next.mi},${next.li})">
        <span class="nav-btn-label">Next →</span>
        <span class="nav-btn-title">${next.lesson.title}</span>
       </button>`
    : `<button class="nav-btn right" disabled>
        <span class="nav-btn-label">Next →</span>
        <span class="nav-btn-title">End of course</span>
       </button>`;

  const completeBtn = done
    ? `<button class="btn-already-done">&#10003; Completed</button>`
    : `<button class="btn-complete" onclick="markComplete()">Mark Complete &amp; Continue &rarr;</button>`;

  const doneBadge = done ? `<span class="badge-done">&#10003; Completed</span>` : '';
  const lessonNum = `${mi + 1}.${li + 1}`;

  document.getElementById('main').innerHTML = `
    <div class="lesson-view fade-in" id="lesson-content"
      style="--mc:${mod.color};--mc-bg:${mcBg}">
      <p class="breadcrumb">${mod.title} <span>&rsaquo; ${lesson.title}</span></p>
      <div class="lesson-video-card">
        <div class="lesson-video-embed">
          <!--
            VIDEO EMBED — uncomment one option for this lesson:

            YouTube:
            <iframe width="100%" height="100%"
              src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
              frameborder="0" allow="accelerometer; autoplay; clipboard-write;
              encrypted-media; gyroscope; picture-in-picture" allowfullscreen
              style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>

            Vimeo:
            <iframe src="https://player.vimeo.com/video/YOUR_VIDEO_ID"
              width="100%" height="100%" frameborder="0"
              allow="autoplay; fullscreen; picture-in-picture"
              style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>

            HTML5:
            <video controls style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
              <source src="lesson-${lessonNum}.mp4" type="video/mp4">
            </video>
          -->
          <div class="lesson-play-btn"></div>
          <div class="lesson-video-caption">
            <strong>${lesson.title}</strong>
            (Paste your video embed here)
          </div>
          <span class="lesson-duration-badge">&#9201; ${lesson.duration}</span>
        </div>
      </div>
      <p class="lesson-tag-line">${mod.icon} ${mod.title} &middot; ${lesson.tag}</p>
      <h1 class="lesson-h1">${lesson.title}</h1>
      <div class="lesson-meta">
        <span class="lesson-meta-item">&#9201; ${lesson.duration}</span>
        <span class="lesson-meta-item">Lesson ${lessonNum}</span>
        ${doneBadge}
      </div>
      <div class="lesson-body">${lesson.body}</div>
      <div class="lesson-nav">
        ${prevBtn}
        ${completeBtn}
        ${nextBtn}
      </div>
    </div>`;

  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0, 0);
}

// ════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════
function goToLesson(mi, li) {
  state.currentModule = mi;
  state.currentLesson = li;
  state.started = true;
  openMods.add(mi);
  saveState();
  renderLesson();
  buildSidebar();
  closeSidebarMobile();
}

function beginCourse() {
  goToLesson(0, 0);
}

// ════════════════════════════════════════════════════════
//  MARK COMPLETE
// ════════════════════════════════════════════════════════
function markComplete() {
  const mi = state.currentModule;
  const li = state.currentLesson;
  state.completed[lessonKey(mi, li)] = true;
  saveState();

  const isLastLesson = li === MODULES[mi].lessons.length - 1;
  const isLastModule = mi === MODULES.length - 1;

  if (!isLastLesson) {
    goToLesson(mi, li + 1);
  } else if (!isLastModule) {
    showModuleComplete(mi);
  } else {
    showCourseComplete();
  }
}

// ════════════════════════════════════════════════════════
//  MODULE COMPLETE
// ════════════════════════════════════════════════════════
function showModuleComplete(mi) {
  const mod = MODULES[mi];
  const nextMod = MODULES[mi + 1];
  buildSidebar();
  updateProgress();

  document.getElementById('main').innerHTML = `
    <div class="celebrate fade-in">
      <div class="celebrate-inner">
        <div class="celebrate-icon"
          style="background:rgba(${hexToRgb(mod.color)},0.15);border:2px solid ${mod.color}">
          ${mod.icon}
        </div>
        <h2 class="celebrate-h">Module ${mi + 1} Complete!</h2>
        <p class="celebrate-sub">
          You've finished <strong>${mod.title}</strong> and built your first AI system for this area of your business.
          Up next: <strong>${nextMod.title}</strong> — ${nextMod.tagline}
        </p>
        <div class="celebrate-btns">
          <button class="btn-gold" onclick="beginNextModule(${mi + 1})">
            Start ${nextMod.title} &rarr;
          </button>
          <button class="btn-outline" onclick="goToLesson(${mi}, 0)">
            Review Module
          </button>
        </div>
      </div>
    </div>`;
}

function beginNextModule(nextMi) {
  goToLesson(nextMi, 0);
}

// ════════════════════════════════════════════════════════
//  COURSE COMPLETE
// ════════════════════════════════════════════════════════
function showCourseComplete() {
  buildSidebar();
  updateProgress();

  const modGrid = MODULES.map(m => `
    <div class="cc-mod">
      <span class="cc-mod-icon">${m.icon}</span>
      <span class="cc-mod-name">${m.title}</span>
    </div>`).join('');

  document.getElementById('main').innerHTML = `
    <div class="celebrate fade-in">
      <div class="celebrate-inner">
        <div style="font-size:3rem;margin-bottom:20px">🏆</div>
        <p style="font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:12px">Program Complete</p>
        <h2 class="celebrate-h">You're an <span style="color:var(--gold)">Auro AI Graduate.</span></h2>
        <p class="celebrate-sub">You've completed all 4 modules and 20 lessons. You've built AI systems for Finance, Marketing, Customer Service, and Sales. You're now operating with a competitive advantage that most businesses won't have for years.</p>
        <div class="course-complete-mods">${modGrid}</div>
        <button class="btn-gold" onclick="goToLesson(0,0)">Review the Full Course &#x21A9;</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
function init() {
  loadState();
  // Open sidebar to the current module
  if (state.started) openMods = new Set([state.currentModule]);
  buildSidebar();

  if (!state.started) {
    showWelcome();
  } else {
    renderLesson();
  }
}

init();
</script>
